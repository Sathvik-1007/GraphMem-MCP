<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>GraphMem Explorer</title>
    <!--
      The server substitutes the live session token for this placeholder when
      it serves the document, so the built file on disk contains no secret.
      In `vite dev` the placeholder is left as-is and the API is unauthenticated.
    -->
    <meta name="graphmem-session-token" content="__GRAPHMEM_SESSION_TOKEN__" />
  </head>

    <script type="module" src="/src/main.tsx"></script>
  </body>
