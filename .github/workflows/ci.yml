name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      # The [full] extra is needed for type-checking: mypy follows the
      # aiohttp and sentence-transformers imports in the UI and semantic
      # layers, and cannot check them if they are absent.
      - name: Install dependencies
        run: pip install -e ".[full,dev]"
      - name: Ruff check
        run: ruff check src/ tests/ benchmarks/
      - name: Ruff format check
        run: ruff format --check src/ tests/ benchmarks/
      # mypy is configured strict in pyproject.toml and was previously never
      # run anywhere, so the configuration described a standard the code was
      # not held to.
      - name: Mypy (strict)
        run: mypy src/graph_mem

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: ui-frontend
      - name: Type-check and build
        run: npm run build
        working-directory: ui-frontend
      # The built bundle is committed and shipped inside the wheel. Without
      # this check it could drift from the source it claims to be built from,
      # and nothing would notice.
      - name: Verify the committed bundle matches the source
        run: |
          if ! git diff --quiet -- src/graph_mem/ui/frontend; then
            echo "::error::The committed frontend bundle differs from a fresh build."
            echo "Run 'npm run build' in ui-frontend/ and commit the result."
            git diff --stat -- src/graph_mem/ui/frontend
            exit 1
          fi
          echo "Committed bundle matches the source."

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[full,dev]"
      - name: Run tests
        run: pytest tests/ -x -q --tb=short
      - name: Run tests with coverage
        if: matrix.python-version == '3.13'
        run: pytest tests/ --cov=graph_mem --cov-report=term-missing --cov-report=xml --cov-fail-under=80
      - name: Upload coverage
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install build tools
        run: pip install build
      - name: Build sdist and wheel
        run: python -m build
      - name: Verify wheel contents
        run: |
          pip install dist/*.whl
          graph-mem --help
          python -c "from graph_mem.server import mcp; print('Import OK')"
      # Installing from the wheel is the only way to catch packaging paths that
      # resolve correctly in a source checkout and nowhere else.
      - name: Verify packaged data resolves from an installed wheel
        run: |
          cd /tmp
          python - <<'PY'
          import importlib.resources
          import pathlib

          from graph_mem.cli.install import _assemble_skill_content

          # This checks that the *data files* made it into the wheel, so it
          # resolves the frontend directory directly instead of importing
          # graph_mem.ui.server — that module needs aiohttp, an optional extra
          # a bare wheel install does not have, and importing it here failed
          # the build for a reason that had nothing to do with packaging.
          skill = _assemble_skill_content("general")
          assert len(skill) > 15_000, f"bundled skill is only {len(skill)} chars"

          frontend = pathlib.Path(str(importlib.resources.files("graph_mem.ui") / "frontend"))
          assert (frontend / "index.html").is_file(), f"no index.html under {frontend}"
          assets = list((frontend / "assets").glob("*.js"))
          assert assets, f"no JS bundle under {frontend / 'assets'}"

          print(f"Wheel is complete: skill {len(skill)} chars, frontend {len(assets)} bundle(s)")
          PY
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
